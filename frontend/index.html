<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VEKTOR — Agent Intelligence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; background: #080F1C; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // Shim for module syntax
    window.exports = {};
    window.module = { exports: window.exports };
  </script>
  <script type="text/babel" data-type="module" src="app.jsx"></script>
  <script>
    window.addEventListener('load', () => {
      if (!document.getElementById('root').innerHTML) {
        // Try rendering if default export exists
        const App = window.exports?.default || window.module?.exports?.default;
        if (App) {
          ReactDOM.createRoot(document.getElementById('root')).render(
            React.createElement(App)
          );
        }
      }
    });
  </script>
</body>
</html>
